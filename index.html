<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNBLOCKEDZONE</title>
<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script src="/baremux/index.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', system-ui, sans-serif;
    cursor: none !important;
}

html, body {
    width: 100%;
    height: 100%;
    background: #0a0500;
    overflow: hidden;
    color: #fff;
}

#particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

#rain {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

.container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.logo {
    font-size: 2.5rem;
    font-weight: 700;
    color: #ff8c00;
    text-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: 1px;
}

.subtitle {
    font-size: 1rem;
    color: #b0b0b0;
    font-style: italic;
    margin-bottom: 30px;
    text-align: center;
}

.quote-box {
    min-height: 28px;
    margin-bottom: 25px;
    text-align: center;
    max-width: 600px;
}

.quote-text {
    font-size: 0.95rem;
    color: #ff8c00;
    opacity: 0;
    transition: opacity 0.5s ease;
    text-shadow: 0 0 10px rgba(255, 140, 0, 0.3);
}

.quote-text.visible {
    opacity: 1;
}

.search-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 520px;
}

.search-box {
    flex: 1;
    height: 48px;
    background: #1a0f05;
    border: 2px solid #ff8c00;
    border-radius: 12px;
    padding: 0 18px;
    display: flex;
    align-items: center;
    box-shadow: 0 0 15px rgba(255, 140, 0, 0.15);
    transition: box-shadow 0.3s ease;
}

.search-box:focus-within {
    box-shadow: 0 0 25px rgba(255, 140, 0, 0.3);
}

.search-box input {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 15px;
}

.search-box input::placeholder {
    color: #666;
}

.icon-btn {
    width: 48px;
    height: 48px;
    background: #1a0f05;
    border: 2px solid #ff8c00;
    border-radius: 12px;
    color: #ff8c00;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px rgba(255, 140, 0, 0.15);
    transition: all 0.2s ease;
}

.icon-btn:hover {
    background: #ff8c00;
    color: #000;
    box-shadow: 0 0 25px rgba(255, 140, 0, 0.4);
}

.viewframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(100% - 48px);
    border: none;
    z-index: 100;
    display: none;
    background: #000;
}

.viewframe.active {
    display: block;
}

.bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 48px;
    background: #1a1a1a;
    border-top: 1px solid #333;
    z-index: 101;
    display: none;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
}

.bottom-bar.active {
    display: flex;
}

.nav-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #aaa;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.nav-btn:hover {
    background: #333;
    color: #fff;
}

.address-bar {
    flex: 1;
    height: 32px;
    background: #2a2a2a;
    border-radius: 16px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    color: #fff;
    font-size: 13px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}

.custom-cursor {
    position: fixed;
    top: 0;
    left: 0;
    width: 22px;
    height: 22px;
    border: 2px solid #ff8c00;
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    box-shadow: 0 0 10px #ff8c00, 0 0 20px rgba(255, 140, 0, 0.4);
    transform: translate(-50%, -50%);
    transition: transform 0.05s ease-out;
}

.custom-cursor::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 4px;
    background: #ff8c00;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 6px #ff8c00;
}

.settings-panel {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 5, 0, 0.9);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
}

.settings-panel.active {
    display: flex;
}

.settings-content {
    background: #1a0f05;
    border: 2px solid #ff8c00;
    border-radius: 16px;
    padding: 28px;
    width: 300px;
    box-shadow: 0 0 30px rgba(255, 140, 0, 0.2);
}

.settings-content h3 {
    margin-bottom: 20px;
    color: #ff8c00;
    text-align: center;
    font-size: 1.2rem;
}

.setting-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
}

.setting-item label {
    color: #ccc;
    font-size: 14px;
}

.setting-item input[type="color"] {
    width: 50px;
    height: 36px;
    border: none;
    border-radius: 8px;
    background: none;
}
</style>
<base target="_blank">
</head>
<body>

<div class="custom-cursor" id="cursor"></div>

<canvas id="particles"></canvas>
<canvas id="rain"></canvas>

<div class="container" id="mainPage">
    <div class="logo">
        <span>🎮</span>
        <span>UNBLOCKEDZONE!</span>
        <span>💻</span>
    </div>

    <div class="subtitle">
        Join the Discord, Follow the TikTok, and subscribe to the YouTube! - UNBLOCKEDZONE
    </div>

    <div class="quote-box">
        <div class="quote-text visible" id="quoteDisplay"></div>
    </div>

    <form class="search-wrapper" id="searchForm">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search For Games! V3.8S - Up to Date!" autocomplete="off">
        </div>
        <button type="submit" class="icon-btn">
            <i class="fas fa-magnifying-glass"></i>
        </button>
        <button type="button" class="icon-btn" id="settingsBtn">
            <i class="fas fa-gear"></i>
        </button>
    </form>
</div>

<div class="settings-panel" id="settingsPanel">
    <div class="settings-content">
        <h3>Settings</h3>
        <div class="setting-item">
            <label>Particle Color</label>
            <input type="color" id="particleColorInput" value="#ff8c00">
        </div>
        <button class="icon-btn" id="closeSettings" style="width:100%;margin-top:15px;">Close</button>
    </div>
</div>

<iframe class="viewframe" id="viewframe" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups"></iframe>

<div class="bottom-bar" id="bottomBar">
    <button class="nav-btn" id="homeBtn"><i class="fas fa-house"></i></button>
    <div class="address-bar" id="addressBar">https://unblockedzone.com</div>
    <button class="nav-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
    <button class="nav-btn" id="forwardBtn"><i class="fas fa-arrow-right"></i></button>
    <button class="nav-btn" id="reloadBtn"><i class="fas fa-rotate-right"></i></button>
    <button class="nav-btn" id="closeBtn"><i class="fas fa-xmark"></i></button>
</div>

<script>
navigator.serviceWorker?.register("/uv/sw.js");

const connection = new BareMux.BareMuxConnection("/baremux/worker.js");
connection.setTransport("/libcurl/index.mjs", [{ websocket: "wss://wisp.rhw.one/" }]);

let particleColor = "#ff8c00";

function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

const quotes = [
    "If you see this quote, I broke my code - UNBL0CKEDZ0NE",
    "Rattler is kinda good, if you know, you know. - UberMint64",
    "fortnite  please  🍕🍕🍕🍕 - Matias 12/11/24",
    "the site got leaked again - UberMint64",
    "If you rub an magnet next to a Chromebook, it will turn off. - UNBL0CKEDZ0NE",
    "Press Ctrl Shift W to close all windows. - UNBL0CKEDZ0NE",
    "Ctrl Shift T brings back that window. - UNBL0CKEDZ0NE",
    "rub your Chromebook for good luck - UNBL0CKEDZ0NE",
    "Delete System32 for storage - muffled",
    "Why Partner with me? - muffled",
    "its not my fault if you block this link. - UNBL0CKEDZ0NE",
    "Join the Discord, follow the TikTok, and subscribe to the YouTube! - UNBL0CKEDZ0NE",
    "Use Scratch to listen to music! - UNBL0CKEDZ0NE",
    "UberMint64 has 64 in his name. (SM64 Reference?) - UNBL0CKEDZ0NE",
    "Use my forms so I can make this the best possible site! - UNBL0CKEDZ0NE",
    "I hope these quotes are in order - UNBL0CKEDZ0NE",
    "To eat, you must put food in your mouth. - UberMint64",
    "Shoutout to UberMint64- UNBL0CKEDZ0NE",
    "You should add a bunch of games from other game sites to look like you site is superior - Isaiah",
    "Pepsi man - jaedon",
    "chicken war - Henry",
    "this is for dis site - muffled_lemon (btw they are not muffled)",
    "I just wanted to say thank for adding YoungBoy - izeah",
    "Console - Restarting Quotes ⟳ [ETA - 5s]"
];

let quoteIndex = 0;
const quoteDisplay = document.getElementById("quoteDisplay");

function rotateQuote() {
    quoteDisplay.classList.remove("visible");
    setTimeout(() => {
        quoteDisplay.textContent = quotes[quoteIndex];
        quoteDisplay.classList.add("visible");
        quoteIndex = (quoteIndex + 1) % quotes.length;
    }, 500);
}

rotateQuote();
setInterval(rotateQuote, 5000);

function normalize(input) {
    if (!input.includes(".")) {
        return "https://search.brave.com/search?q=" + encodeURIComponent(input);
    }
    if (!input.startsWith("http")) return "https://" + input;
    return input;
}

const searchForm = document.getElementById("searchForm");
const searchInput = document.getElementById("searchInput");
const mainPage = document.getElementById("mainPage");
const viewframe = document.getElementById("viewframe");
const bottomBar = document.getElementById("bottomBar");
const addressBar = document.getElementById("addressBar");

searchForm.onsubmit = (e) => {
    e.preventDefault();
    const val = searchInput.value.trim();
    if (!val) return;

    mainPage.style.display = "none";
    
    const url = normalize(val);
    const encoded = __uv$config.prefix + __uv$config.encodeUrl(url);
    
    viewframe.src = encoded;
    addressBar.textContent = url;
    viewframe.classList.add("active");
    bottomBar.classList.add("active");
};

document.getElementById("closeBtn").onclick = () => {
    viewframe.classList.remove("active");
    bottomBar.classList.remove("active");
    mainPage.style.display = "flex";
    viewframe.src = "";
    searchInput.value = "";
    searchInput.focus();
};

document.getElementById("backBtn").onclick = () => {
    viewframe.contentWindow.history.back();
};

document.getElementById("forwardBtn").onclick = () => {
    viewframe.contentWindow.history.forward();
};

document.getElementById("reloadBtn").onclick = () => {
    viewframe.src = viewframe.src;
};

document.getElementById("homeBtn").onclick = () => {
    const homeUrl = "https://sites.google.com/view/g0sfwfs-vocm0dlfe/home?read_current=1";
    const encoded = __uv$config.prefix + __uv$config.encodeUrl(homeUrl);
    viewframe.src = encoded;
    addressBar.textContent = homeUrl;
    viewframe.classList.add("active");
    bottomBar.classList.add("active");
    mainPage.style.display = "none";
};

const settingsPanel = document.getElementById("settingsPanel");
const particleColorInput = document.getElementById("particleColorInput");

document.getElementById("settingsBtn").onclick = () => {
    settingsPanel.classList.add("active");
};

document.getElementById("closeSettings").onclick = () => {
    settingsPanel.classList.remove("active");
};

particleColorInput.addEventListener("input", (e) => {
    particleColor = e.target.value;
});

const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

const mouse = { x: null, y: null, radius: 150 };

window.addEventListener("mousemove", (e) => {
    mouse.x = e.x;
    mouse.y = e.y;
});

window.addEventListener("mouseout", () => {
    mouse.x = null;
    mouse.y = null;
});

const pCanvas = document.getElementById("particles");
const pCtx = pCanvas.getContext("2d");
let pWidth, pHeight;

function pResize() {
    pWidth = pCanvas.width = window.innerWidth;
    pHeight = pCanvas.height = window.innerHeight;
}

pResize();
window.addEventListener("resize", pResize);

class Particle {
    constructor() {
        this.x = Math.random() * pWidth;
        this.y = Math.random() * pHeight;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = (Math.random() - 0.5) * 1.5;
        this.size = Math.random() * 3 + 1;
        this.baseX = this.x;
        this.baseY = this.y;
        this.density = (Math.random() * 30) + 1;
    }

    update() {
        if (mouse.x != null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let forceDirectionX = dx / distance;
            let forceDirectionY = dy / distance;
            let maxDistance = mouse.radius;
            let force = (maxDistance - distance) / maxDistance;
            let directionX = forceDirectionX * force * this.density;
            let directionY = forceDirectionY * force * this.density;

            if (distance < mouse.radius) {
                this.x -= directionX;
                this.y -= directionY;
            } else {
                if (this.x !== this.baseX) {
                    let dx = this.x - this.baseX;
                    this.x -= dx / 20;
                }
                if (this.y !== this.baseY) {
                    let dy = this.y - this.baseY;
                    this.y -= dy / 20;
                }
            }
        } else {
            if (this.x !== this.baseX) {
                let dx = this.x - this.baseX;
                this.x -= dx / 20;
            }
            if (this.y !== this.baseY) {
                let dy = this.y - this.baseY;
                this.y -= dy / 20;
            }
        }

        this.baseX += this.vx;
        this.baseY += this.vy;

        if (this.baseX < 0 || this.baseX > pWidth) this.vx = -this.vx;
        if (this.baseY < 0 || this.baseY > pHeight) this.vy = -this.vy;

        this.x += this.vx * 0.3;
        this.y += this.vy * 0.3;
    }

    draw() {
        pCtx.beginPath();
        pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        pCtx.fillStyle = particleColor;
        pCtx.shadowBlur = 10;
        pCtx.shadowColor = hexToRgba(particleColor, 0.8);
        pCtx.fill();
        pCtx.shadowBlur = 0;
    }
}

const particlesArray = [];
for (let i = 0; i < 120; i++) {
    particlesArray.push(new Particle());
}

function pConnect() {
    for (let a = 0; a < particlesArray.length; a++) {
        for (let b = a; b < particlesArray.length; b++) {
            let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
            if (distance < (pWidth/7) * (pHeight/7)) {
                let opacity = 1 - (distance / 20000);
                pCtx.strokeStyle = hexToRgba(particleColor, opacity);
                pCtx.lineWidth = 1;
                pCtx.beginPath();
                pCtx.moveTo(particlesArray[a].x, particlesArray[a].y);
                pCtx.lineTo(particlesArray[b].x, particlesArray[b].y);
                pCtx.stroke();
            }
        }
    }
}

function pAnimate() {
    pCtx.clearRect(0, 0, pWidth, pHeight);
    for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
    }
    pConnect();
    requestAnimationFrame(pAnimate);
}

pAnimate();

const rCanvas = document.getElementById("rain");
const rCtx = rCanvas.getContext("2d");
let rWidth, rHeight;

function rResize() {
    rWidth = rCanvas.width = window.innerWidth;
    rHeight = rCanvas.height = window.innerHeight;
}

rResize();
window.addEventListener("resize", rResize);

class RainDrop {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = Math.random() * rWidth;
        this.y = Math.random() * -rHeight;
        this.length = Math.random() * 20 + 10;
        this.speed = Math.random() * 8 + 5;
        this.opacity = Math.random() * 0.5 + 0.2;
        this.width = Math.random() * 1.5 + 0.5;
    }

    update() {
        this.y += this.speed;

        if (mouse.x != null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 100) {
                let force = (100 - distance) / 100;
                this.x -= (dx / distance) * force * 5;
            }
        }

        if (this.y > rHeight + this.length) {
            this.reset();
        }
    }

    draw() {
        rCtx.beginPath();
        rCtx.moveTo(this.x, this.y);
        rCtx.lineTo(this.x, this.y + this.length);
        rCtx.strokeStyle = hexToRgba(particleColor, this.opacity);
        rCtx.lineWidth = this.width;
        rCtx.lineCap = "round";
        rCtx.shadowBlur = 6;
        rCtx.shadowColor = hexToRgba(particleColor, this.opacity * 0.6);
        rCtx.stroke();
        rCtx.shadowBlur = 0;
    }
}

const rainArray = [];
for (let i = 0; i < 150; i++) {
    rainArray.push(new RainDrop());
}

function rAnimate() {
    rCtx.clearRect(0, 0, rWidth, rHeight);
    for (let i = 0; i < rainArray.length; i++) {
        rainArray[i].update();
        rainArray[i].draw();
    }
    requestAnimationFrame(rAnimate);
}

rAnimate();
</script>

</body>
