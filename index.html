<style>
:root {
    --theme-color: #ffd700;
    --theme-glow: rgba(255, 215, 0, 0.4);
    --theme-glow-light: rgba(255, 215, 0, 0.15);
    --theme-glow-medium: rgba(255, 215, 0, 0.3);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', system-ui, sans-serif;
    cursor: none !important;
}

html, body {
    width: 100%;
    height: 100%;
    background: #0a0500;
    overflow: hidden;
    color: #fff;
}

#particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

#rain {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

.container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.logo {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--theme-color);
    text-shadow: 0 0 20px var(--theme-glow);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: 1px;
}

.subtitle {
    font-size: 1rem;
    color: #b0b0b0;
    font-style: italic;
    margin-bottom: 30px;
    text-align: center;
}

.quote-box {
    min-height: 28px;
    margin-bottom: 25px;
    text-align: center;
    max-width: 600px;
}

.quote-text {
    font-size: 0.95rem;
    color: var(--theme-color);
    opacity: 0;
    transition: opacity 0.5s ease;
    text-shadow: 0 0 10px var(--theme-glow-medium);
}

.quote-text.visible {
    opacity: 1;
}

.search-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 520px;
}

.search-box {
    flex: 1;
    height: 48px;
    background: #1a0f05;
    border: 2px solid var(--theme-color);
    border-radius: 12px;
    padding: 0 18px;
    display: flex;
    align-items: center;
    box-shadow: 0 0 15px var(--theme-glow-light);
    transition: box-shadow 0.3s ease;
}

.search-box:focus-within {
    box-shadow: 0 0 25px var(--theme-glow-medium);
}

.search-box input {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 15px;
}

.search-box input::placeholder {
    color: #666;
}

.icon-btn {
    width: 48px;
    height: 48px;
    background: #1a0f05;
    border: 2px solid var(--theme-color);
    border-radius: 12px;
    color: var(--theme-color);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px var(--theme-glow-light);
    transition: all 0.2s ease;
}

.icon-btn:hover {
    background: var(--theme-color);
    color: #000;
    box-shadow: 0 0 25px var(--theme-glow);
}

.viewframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(100% - 48px);
    border: none;
    z-index: 100;
    display: none;
    background: #000;
}

.viewframe.active {
    display: block;
}

.bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 48px;
    background: #1a1a1a;
    border-top: 1px solid #333;
    z-index: 101;
    display: none;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
}

.bottom-bar.active {
    display: flex;
}

.nav-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #aaa;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.nav-btn:hover {
    background: #333;
    color: #fff;
}

.address-bar {
    flex: 1;
    height: 32px;
    background: #2a2a2a;
    border-radius: 16px;
    padding: 0 12px;
    display: flex;
    align-items: center;
    color: #fff;
    font-size: 13px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}

.theme-image {
    position: fixed;
    bottom: 48px;
    right: 0;
    height: 120px;
    width: auto;
    z-index: 102;
    pointer-events: none;
    display: none;
    filter: drop-shadow(0 0 10px var(--theme-glow));
}

.theme-image.active {
    display: block;
}

.custom-cursor {
    position: fixed;
    top: 0;
    left: 0;
    width: 22px;
    height: 22px;
    border: 2px solid var(--theme-color);
    border-radius: 50%;
    pointer-events: none;
    z-index: 99999;
    box-shadow: 0 0 10px var(--theme-color), 0 0 20px var(--theme-glow);
    transform: translate(-50%, -50%);
    transition: transform 0.05s ease-out, border-color 0.3s, box-shadow 0.3s;
}

.custom-cursor::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 4px;
    background: var(--theme-color);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 6px var(--theme-color);
    transition: background 0.3s, box-shadow 0.3s;
}

.custom-cursor.dodge-mode {
    width: 48px;
    height: 48px;
    border: none;
    border-radius: 0;
    background-image: url('https://p7.hiclipart.com/preview/748/953/283/doge-clip-art-dog.jpg');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    box-shadow: none;
}

.custom-cursor.dodge-mode::after {
    display: none;
}

.settings-panel {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 5, 0, 0.9);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
}

.settings-panel.active {
    display: flex;

.settings-content {
    background: #1a0f05;

.settings-content h3 {

.theme-option {

.theme-option:hover {

.theme-option.active-theme {

.close-settings {

    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;

    background: var(--theme-color);
    color: #000;

function setTheme(themeName) {
    currentTheme = themeName;
    const t = themes[themeName];
    const root = document.documentElement;
    
    root.style.setProperty('--theme-color', t.color);
    root.style.setProperty('--theme-glow', t.glow);
    root.style.setProperty('--theme-glow-light', t.glowLight);
    root.style.setProperty('--theme-glow-medium', t.glowMedium);
    
    Object.keys(themes).forEach(key => {
        const btn = document.getElementById(key + 'Theme');
        if (btn) btn.classList.toggle('active-theme', themeName === key);
    });
    
    Object.keys(themes).forEach(key => {
        const img = document.getElementById(themes[key].image);
        if (img) img.classList.toggle('active', themeName === key);
    });
    
    const cursor = document.getElementById('cursor');
    cursor.classList.toggle('dodge-mode', themeName === 'dodge');
}

function normalize(input) {
    if (!input.includes(".")) {
        return "https://search.brave.com/search?q=" + encodeURIComponent(input);
    }
    if (!input.startsWith("http")) return "https://" + input;
    return input;
}

const addressBar = document.getElementById("addressBar");

searchForm.onsubmit = (e) => {
    e.preventDefault();
    const val = searchInput.value.trim();
    if (!val) return;

    mainPage.style.display = "none";
    
    const url = normalize(val);
    const encoded = __uv$config.prefix + __uv$config.encodeUrl(url);
    
    viewframe.src = encoded;
    addressBar.textContent = url;
    viewframe.classList.add("active");
    bottomBar.classList.add("active");
};

function pResize() {
    pWidth = pCanvas.width = window.innerWidth;
    pHeight = pCanvas.height = window.innerHeight;
}

pResize();
window.addEventListener("resize", pResize);

class Particle {
    constructor() {
        this.x = Math.random() * pWidth;
        this.y = Math.random() * pHeight;
        this.vx = (Math.random() - 0.5) * 1.5;
        this.vy = (Math.random() - 0.5) * 1.5;
        this.size = Math.random() * 3 + 1;
        this.baseX = this.x;
        this.baseY = this.y;
        this.density = (Math.random() * 30) + 1;
    }

    update() {
        if (mouse.x != null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let forceDirectionX = dx / distance;
            let forceDirectionY = dy / distance;
            let maxDistance = mouse.radius;
            let force = (maxDistance - distance) / maxDistance;
            let directionX = forceDirectionX * force * this.density;
            let directionY = forceDirectionY * force * this.density;

            if (distance < mouse.radius) {
                this.x -= directionX;
                this.y -= directionY;
            } else {
                if (this.x !== this.baseX) {
                    let dx = this.x - this.baseX;
                    this.x -= dx / 20;
                }
                if (this.y !== this.baseY) {
                    let dy = this.y - this.baseY;
                    this.y -= dy / 20;
                }
            }
        } else {
            if (this.x !== this.baseX) {
                let dx = this.x - this.baseX;
                this.x -= dx / 20;
            }
            if (this.y !== this.baseY) {
                let dy = this.y - this.baseY;
                this.y -= dy / 20;
            }
        }

        this.baseX += this.vx;
        this.baseY += this.vy;

        if (this.baseX < 0 || this.baseX > pWidth) this.vx = -this.vx;
        if (this.baseY < 0 || this.baseY > pHeight) this.vy = -this.vy;

        this.x += this.vx * 0.3;
        this.y += this.vy * 0.3;
    }

    draw() {
        const color = getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim();
        pCtx.beginPath();
        pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        pCtx.fillStyle = color;
        pCtx.shadowBlur = 10;
        pCtx.shadowColor = color;
        pCtx.fill();
        pCtx.shadowBlur = 0;
    }
}

const particlesArray = [];
for (let i = 0; i < 120; i++) {
    particlesArray.push(new Particle());
}

function getRgbFromHex(hex) {
    if (hex.startsWith('#')) {
        return {
            r: parseInt(hex.slice(1, 3), 16),
            g: parseInt(hex.slice(3, 5), 16),
            b: parseInt(hex.slice(5, 7), 16)
        };
    }
    return { r: 255, g: 255, b: 255 };
}

function pConnect() {
    const color = getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim();
    const rgb = getRgbFromHex(color);
    
    for (let a = 0; a < particlesArray.length; a++) {
        for (let b = a; b < particlesArray.length; b++) {
            let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
            if (distance < (pWidth/7) * (pHeight/7)) {
                let opacity = 1 - (distance / 20000);
                pCtx.strokeStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${opacity})`;
                pCtx.lineWidth = 1;
                pCtx.beginPath();
                pCtx.moveTo(particlesArray[a].x, particlesArray[a].y);
                pCtx.lineTo(particlesArray[b].x, particlesArray[b].y);
                pCtx.stroke();
            }
        }
    }
}

function pAnimate() {
    pCtx.clearRect(0, 0, pWidth, pHeight);
    for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
    }
    pConnect();
    requestAnimationFrame(pAnimate);
}

pAnimate();

const rCanvas = document.getElementById("rain");
const rCtx = rCanvas.getContext("2d");
let rWidth, rHeight;

function rResize() {
    rWidth = rCanvas.width = window.innerWidth;
    rHeight = rCanvas.height = window.innerHeight;
}

rResize();
window.addEventListener("resize", rResize);

class RainDrop {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = Math.random() * rWidth;
        this.y = Math.random() * -rHeight;
        this.length = Math.random() * 20 + 10;
        this.speed = Math.random() * 8 + 5;
        this.opacity = Math.random() * 0.5 + 0.2;
        this.width = Math.random() * 1.5 + 0.5;
    }

    update() {
        this.y += this.speed;

        if (mouse.x != null) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 100) {
                let force = (100 - distance) / 100;
                this.x -= (dx / distance) * force * 5;
            }
        }

        if (this.y > rHeight + this.length) {
            this.reset();
        }
    }

    draw() {
        const color = getComputedStyle(document.documentElement).getPropertyValue('--theme-color').trim();
        const rgb = getRgbFromHex(color);
        
        rCtx.beginPath();
        rCtx.moveTo(this.x, this.y);
        rCtx.lineTo(this.x, this.y + this.length);
        rCtx.strokeStyle = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${this.opacity})`;
        rCtx.lineWidth = this.width;
        rCtx.lineCap = "round";
        rCtx.shadowBlur = 6;
        rCtx.shadowColor = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${this.opacity * 0.6})`;
        rCtx.stroke();
        rCtx.shadowBlur = 0;
    }
}

const rainArray = [];
for (let i = 0; i < 150; i++) {
    rainArray.push(new RainDrop());
}

function rAnimate() {
    rCtx.clearRect(0, 0, rWidth, rHeight);
    for (let i = 0; i < rainArray.length; i++) {
        rainArray[i].update();
        rainArray[i].draw();
    }
    requestAnimationFrame(rAnimate);
}

rAnimate();
</script>
